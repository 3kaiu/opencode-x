name: Native Modules

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  build-rust:
    # 只构建 macOS 产物（Apple Silicon）
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-bun
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - name: Build Rust crates (cargo)
        run: cargo build --manifest-path natives/Cargo.toml
      - name: Build NAPI binaries
        run: bun run build:napi
      - name: Run native tests (core)
        run: bun test ./test/native.test.ts
        working-directory: packages/core

  typecheck:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-bun
      - name: Typecheck
        run: bun run typecheck

  lint:
    # 代码风格检查
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-bun
      - name: Lint
        run: bun run lint
