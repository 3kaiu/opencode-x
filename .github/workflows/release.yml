name: release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        target:
          - os: macos-14
            suffix: darwin-arm64
          - os: ubuntu-24.04
            suffix: linux-x64
    runs-on: ${{ matrix.target.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: ./.github/actions/setup-bun

      - name: Typecheck
        run: bun run --cwd packages/core typecheck

      - name: Build CLI binary
        run: |
          OPENCODE_CHANNEL=latest OPENCODE_VERSION="${GITHUB_REF#refs/tags/v}" bun run --cwd packages/opencode script/build.ts --skip-embed-web-ui --single --skip-install

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: opencode-${{ matrix.target.suffix }}
          path: packages/opencode/dist/opencode-${{ matrix.target.suffix }}/bin/opencodex
          if-no-files-found: error

  create-release:
    needs: build
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Package assets
        run: |
          mkdir -p release-assets
          for dir in opencode-*; do
            asset_name="${dir}.tar.gz"
            tar czf "release-assets/${asset_name}" -C "${dir}" opencodex
          done
          ls -la release-assets/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: release-assets/*
          fail_on_unmatched_files: true

      - name: Update Homebrew formula
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          echo "Updating formula to version ${VERSION}"

          DARWIN_ARM_SHA=$(shasum -a 256 release-assets/opencode-darwin-arm64.tar.gz | awk '{print $1}')
          DARWIN_X64_SHA=$(shasum -a 256 release-assets/opencode-darwin-x64.tar.gz | awk '{print $1}')
          LINUX_ARM_SHA=$(shasum -a 256 release-assets/opencode-linux-arm64.tar.gz | awk '{print $1}')
          LINUX_X64_SHA=$(shasum -a 256 release-assets/opencode-linux-x64.tar.gz | awk '{print $1}')

          sed -i "s/version \".*\"/version \"${VERSION}\"/" Formula/opencodex.rb
          sed -i "/darwin-arm64.tar.gz\"/{n;s/sha256 \".*\"/sha256 \"${DARWIN_ARM_SHA}\"/}" Formula/opencodex.rb
          sed -i "/darwin-x64.tar.gz\"/{n;s/sha256 \".*\"/sha256 \"${DARWIN_X64_SHA}\"/}" Formula/opencodex.rb
          sed -i "/linux-arm64.tar.gz\"/{n;s/sha256 \".*\"/sha256 \"${LINUX_ARM_SHA}\"/}" Formula/opencodex.rb
          sed -i "/linux-x64.tar.gz\"/{n;s/sha256 \".*\"/sha256 \"${LINUX_X64_SHA}\"/}" Formula/opencodex.rb

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/opencodex.rb
          git commit -m "opencodex: update formula to v${VERSION}" || true
          git push origin HEAD:main