name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  typecheck:
    # 只在 macOS 构建（Apple Silicon）
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-bun
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - run: bun run build:napi
      - run: bun run --cwd packages/core typecheck
      - run: bun run --cwd packages/opencode typecheck
      - run: bun run --cwd packages/tui typecheck

  test:
    # 只在 macOS 运行测试
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-bun
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - run: bun run build:napi
      - run: bun run --cwd packages/core test
      - run: bun run --cwd packages/llm test
