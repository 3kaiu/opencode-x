name: release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        target:
          - os: macos-14
            suffix: darwin-arm64
          - os: ubuntu-24.04
            suffix: linux-x64
    runs-on: ${{ matrix.target.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: ./.github/actions/setup-bun

      - uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Build napi module
        run: bun run build:napi

      - name: Typecheck
        run: bun run --cwd packages/core typecheck

      - name: Build CLI binary
        run: |
          bun run --cwd packages/opencode script/build.ts --skip-embed-web-ui --single --skip-install

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: opencode-${{ matrix.target.suffix }}
          path: packages/opencode/dist/opencode-${{ matrix.target.suffix }}/bin/opencode
          if-no-files-found: error

  create-release:
    needs: build
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Compute SHA256 and package assets
        id: assets
        run: |
          mkdir -p release-assets
          echo "sha256<<" >> "$GITHUB_OUTPUT"
          for dir in opencode-*; do
            asset_name="${dir}.tar.gz"
            tar czf "release-assets/${asset_name}" -C "${dir}" opencode
            sha=$(shasum -a 256 "release-assets/${asset_name}" | cut -d' ' -f1)
            echo "${asset_name}: ${sha}"
            echo "${asset_name}: ${sha}" >> "$GITHUB_OUTPUT"
          done
          echo "" >> "$GITHUB_OUTPUT"
          ls -la release-assets/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: release-assets/*
          fail_on_unmatched_files: true