name: Native Modules

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  build-rust:
    strategy:
      matrix:
        os: [ubuntu-24.04, macos-14, windows-2025]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-bun
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - name: Build Rust crates (cargo)
        run: cargo build --manifest-path natives/Cargo.toml
      - name: Build NAPI binaries
        run: bun run build:napi
      - name: Run native tests (core)
        run: bun test ./test/native.test.ts
        working-directory: packages/core
      # REMOVED: native SSE tests (test/provider-proxy/ directory no longer exists)
      # - name: Run native SSE tests
      #   run: bun test ./test/provider-proxy/native-sse.test.ts
      #   working-directory: packages/opencode

  # REMOVED: build-zig job (natives/token-counter/ directory was deleted in cleanup)
  # See AUDIT.md: "natives/token-counter/ 已删除"

  typecheck:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-bun
      - run: bun run --cwd packages/core typecheck
      - run: bun run --cwd packages/opencode typecheck

  lint:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-bun
      - run: bun run lint
